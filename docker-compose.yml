version: '3.1'

networks:
  knit_tracker:
    driver: bridge

services:
  app:
    depends_on:
      - redis
      - postgres
    container_name: knit_tracker
    restart: unless-stopped
    command: bash -c "npm run start:dev"
    env_file: ./.env
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '4000:4000'
    volumes:
      - .:/code
      - /code/node_modules
    environment:
      DB_HOST: postgres
      DB_USER: $DB_USER
      DB_PASSWORD: $DB_PASSWORD
      DB_NAME: $DB_NAME
      DB_PORT: $DB_PORT
      AUTH_REDIS_URL: redis://default:xsoft@redis:6379
    stdin_open: true
    tty: true
    networks:
      - knit_tracker

  redis:
    container_name: knit_tracker_redis
    image: redis:latest
    restart: unless-stopped
    command: redis-server --appendonly yes
    hostname: redis
    expose:
      - 6379
    networks:
      - knit_tracker

  postgres:
    container_name: knit_tracker_postgres
    image: postgres
    ports:
      - '5442:$DB_PORT'
    env_file: ./.env
    environment:
      POSTGRES_USER: $DB_USER
      POSTGRES_PASSWORD: $DB_PASSWORD
      POSTGRES_DB: $DB_NAME
    networks:
      - knit_tracker
